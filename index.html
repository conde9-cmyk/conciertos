<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/conciertos/manifest.json">
<meta name="theme-color" content="#ff0000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Mis Conciertos">
<title>🤘 Mis Conciertos</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Arial Black', Arial, sans-serif; background: #000; color: #fff; }
#app { min-height: 100vh; background: #000; }
.container { width: 100%; max-width: 600px; margin: 0 auto; padding: 8px; }
.header { text-align: center; padding: 20px 10px 10px 10px; }
.logo { font-size: 90px; margin-bottom: 4px; }
.title { font-size: 52px; color: #f00; margin-bottom: 4px; text-transform: uppercase; }
.subtitle { color: #999; font-size: 18px; text-transform: uppercase; }
.btn { width: 100%; background: #1a0000; border: 3px solid #f00; border-radius: 12px; padding: 38px 10px; margin-bottom: 24px; cursor: pointer; }
.btn-text { font-size: 36px; font-weight: 900; color: #f00; text-transform: uppercase; }
.card { background: #0a0000; border: 2px solid #f00; border-radius: 15px; padding: 14px; }
.card-title { font-size: 36px; color: #f00; margin-bottom: 16px; text-transform: uppercase; }
.back-btn { display: block; width: 50%; background: #1a0000; border: 2px solid #f00; border-radius: 10px; color: #f00; font-size: 24px; font-weight: 900; padding: 16px 18px; margin-bottom: 12px; cursor: pointer; text-align: left; }
.label { display: block; color: #f00; margin-bottom: 6px; font-size: 20px; text-transform: uppercase; font-weight: 900; }
.input { width: 100%; padding: 18px; background: #000; border: 1px solid #f00; border-radius: 8px; color: #fff; font-size: 22px; margin-bottom: 16px; text-transform: uppercase; }
.input::placeholder { text-transform: none; }
.input[type=number] { text-transform: none; }
.input[list] { -webkit-appearance: none; appearance: none; }
.tipo-selector { display: flex; gap: 10px; margin-bottom: 10px; }
.tipo-btn { flex: 1; padding: 18px; background: #000; border: 2px solid #f00; border-radius: 8px; color: #f00; font-weight: 900; cursor: pointer; font-size: 22px; }
.tipo-btn.active-concierto { background: #f00; color: #000; border-color: #f00; }
.tipo-btn.active-festival { background: #ffd700; color: #000; border-color: #ffd700; }
.submit-btn { width: 100%; padding: 20px; background: #f00; color: #000; border: none; border-radius: 8px; font-size: 26px; font-weight: 900; cursor: pointer; margin-top: 8px; }
.export-btn { width: 100%; padding: 20px; background: #000; border: 2px solid #f00; border-radius: 8px; color: #f00; font-size: 24px; font-weight: 900; cursor: pointer; margin-top: 12px; }
.import-btn { width: 100%; padding: 20px; background: #000; border: 2px solid #ffd700; border-radius: 8px; color: #ffd700; font-size: 24px; font-weight: 900; cursor: pointer; margin-top: 12px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
.stat-card { padding: 18px; border-radius: 12px; border: 2px solid; cursor: pointer; }
.stat-concierto { background: linear-gradient(145deg, #ff0000, #8b0000); border-color: #ff0000; }
.stat-festival { background: linear-gradient(145deg, #ffd700, #cc9900); border-color: #ffd700; }
.stat-dinero { background: linear-gradient(145deg, #00aa00, #005500); border-color: #00ff00; grid-column: 1 / -1; }
.stat-number { font-size: 44px; font-weight: 900; margin-bottom: 4px; }
.stat-label { font-size: 16px; text-transform: uppercase; }
.stat-concierto .stat-number, .stat-concierto .stat-label { color: #fff; }
.stat-festival .stat-number, .stat-festival .stat-label { color: #000; }
.stat-dinero .stat-number, .stat-dinero .stat-label { color: #fff; }
.list-section { background: rgba(139,0,0,0.1); border: 1px solid #f00; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
.list-title { color: #f00; margin-bottom: 12px; font-size: 22px; text-transform: uppercase; }
.list-container { max-height: 620px; overflow-y: auto; }
.list-item { background: #000; border: 1px solid #f00; padding: 18px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; }
.list-name { color: #fff; font-weight: 700; font-size: 22px; }
.list-badge { background: #f00; color: #000; padding: 6px 14px; border-radius: 15px; font-weight: 900; font-size: 18px; }
.evento-card { background: #1a0000; border: 1px solid #f00; padding: 15px; border-radius: 10px; margin-bottom: 12px; }
.evento-tipo { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
.tipo-concierto { background: #ff0000; color: #000; }
.tipo-festival { background: #ffd700; color: #000; }
.evento-nombre { color: #f00; font-size: 26px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
.evento-info { color: #999; font-size: 20px; margin-bottom: 4px; }
.search-input { width: 100%; padding: 22px; background: #000; border: 2px solid #f00; border-radius: 10px; color: #fff; font-size: 24px; margin-bottom: 14px; }
.filter-bar { display: flex; gap: 8px; margin-bottom: 15px; }
.filter-btn { flex: 1; padding: 14px; background: #000; border: 2px solid #f00; border-radius: 8px; color: #f00; font-weight: 900; cursor: pointer; font-size: 19px; }
.filter-btn.active { background: #f00; color: #000; }
.counter { text-align: center; color: #666; font-size: 20px; margin-top: 20px; }
.delete-btn { background: none; border: none; cursor: pointer; padding: 5px; font-size: 28px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
var eventos = JSON.parse(localStorage.getItem('eventos') || '[]');
var page = 'home';
var detalle = null;
var tipoD = '';
var editando = null;
var form = { tipo: 'concierto', nombre: '', grupos: '', ano: '', lugar: '', ciudad: '', precio: '' };
var search = '';
var filtroTipo = 'todos';
var searchArtista = '';
var sortOrden = { artistas: 'az', ciudades: 'az', lugares: 'az', anos: 'az' };

function getAno(e) {
  if (e.ano !== undefined && e.ano !== null) return e.ano;
  var keys = Object.keys(e);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    if (k !== 'ano' && k.charAt(0) === 'a' && k.charAt(k.length-1) === 'o' && k.length <= 4) return e[k];
  }
  return '';
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getSugs(campo) {
  var vals = {};
  eventos.forEach(function(e) { var v = e[campo] || ''; if (v) vals[v] = 1; });
  return Object.keys(vals).sort();
}

function renderEvento(e, idx) {
  return '<div class="evento-card"><div style="display:flex;justify-content:space-between"><div><div class="evento-tipo tipo-' + e.tipo + '">' + e.tipo + '</div><h3 class="evento-nombre">' + escHtml(e.nombre) + '</h3></div><div style="display:flex;gap:10px"><button class="delete-btn" onclick="accion(' + idx + ',0)" style="color:#ff0">✏️</button><button class="delete-btn" onclick="accion(' + idx + ',1)" style="color:#f00">×</button></div></div>' +
    (e.grupos ? '<div class="evento-info">🎸 ' + escHtml(e.grupos) + '</div>' : '') +
    '<div class="evento-info">📅 ' + escHtml(String(getAno(e))) + '</div>' +
    (e.lugar ? '<div class="evento-info">🏟️ ' + escHtml(e.lugar) + '</div>' : '') +
    (e.ciudad ? '<div class="evento-info">📍 ' + escHtml(e.ciudad) + '</div>' : '') +
    (e.precio ? '<div class="evento-info">💶 ' + escHtml(String(e.precio)) + ' €</div>' : '') +
    '</div>';
}

function render() {
  var app = document.getElementById('app');

  if (page === 'home') {
    app.innerHTML = '<div class="header"><div class="logo">🤘</div><h1 class="title">Mis Conciertos</h1><p class="subtitle">Metal Archives</p></div><div class="container"><button class="btn" onclick="goTo(\'agregar\')"><span class="btn-text">➕ Agregar</span></button><button class="btn" onclick="goTo(\'estadisticas\')"><span class="btn-text">📊 Estadísticas</span></button><button class="btn" onclick="goTo(\'buscar\')"><span class="btn-text">🔍 Buscar</span></button><button class="btn" onclick="goTo(\'datos\')"><span class="btn-text">💾 Datos</span></button><div class="counter">' + eventos.length + ' eventos</div></div>';
  }

  else if (page === 'agregar') {
    var ciudades = getSugs('ciudad');
    var lugares = getSugs('lugar');
    var claseConc = form.tipo === 'concierto' ? 'active-concierto' : '';
    var claseFest = form.tipo === 'festival' ? 'active-festival' : '';
    var html = '<div class="container"><button class="back-btn" onclick="goTo(\'home\')">← Volver</button><div class="card">';
    html += '<h2 class="card-title">' + (editando ? 'Editar' : 'Agregar') + '</h2>';
    html += '<label class="label">Tipo</label>';
    html += '<div class="tipo-selector"><button class="tipo-btn ' + claseConc + '" onclick="setTipo(\'concierto\')">Concierto</button><button class="tipo-btn ' + claseFest + '" onclick="setTipo(\'festival\')">Festival</button></div>';
    html += '<label class="label">Nombre *</label><input id="inNombre" class="input" value="' + escHtml(form.nombre) + '" autocomplete="off">';
    html += '<label class="label">Grupos</label><input id="inGrupos" class="input" value="' + escHtml(form.grupos) + '" placeholder="Separa con comas" autocomplete="off">';
    html += '<label class="label">Año</label><input id="inAno" class="input" type="number" value="' + escHtml(form.ano) + '" style="text-transform:none">';
    html += '<label class="label">Lugar</label><input id="inLugar" class="input" value="' + escHtml(form.lugar) + '" list="listLugares" autocomplete="off"><datalist id="listLugares">';
    lugares.forEach(function(l) { html += '<option value="' + escHtml(l) + '">'; });
    html += '</datalist>';
    html += '<label class="label">Ciudad</label><input id="inCiudad" class="input" value="' + escHtml(form.ciudad) + '" list="listCiudades" autocomplete="off"><datalist id="listCiudades">';
    ciudades.forEach(function(c) { html += '<option value="' + escHtml(c) + '">'; });
    html += '</datalist>';
    html += '<label class="label">Precio entrada (€)</label><input id="inPrecio" class="input" type="number" step="0.01" value="' + escHtml(form.precio) + '" style="text-transform:none">';
    html += '<button class="submit-btn" onclick="guardar()">' + (editando ? 'Actualizar' : 'Guardar') + '</button></div></div>';
    app.innerHTML = html;
  }

  else if (page === 'estadisticas') {
    if (detalle) {
      var evs = [];
      if (tipoD === 'artista') evs = eventos.filter(function(e) { return (e.grupos||'').split(',').map(function(g){return g.trim();}).indexOf(detalle) >= 0; });
      else if (tipoD === 'ciudad') evs = eventos.filter(function(e) { return e.ciudad === detalle; });
      else if (tipoD === 'lugar') evs = eventos.filter(function(e) { return e.lugar === detalle; });
      else if (tipoD === 'ano') evs = eventos.filter(function(e) { return String(getAno(e)) === detalle; });
      else if (tipoD === 'tipo') evs = eventos.filter(function(e) { return e.tipo === detalle; });
      window._curEvs = evs;
      var totalPrecio = 0;
      evs.forEach(function(e) { if (e.precio) totalPrecio += parseFloat(e.precio) || 0; });
      var html = '<div class="container"><button class="back-btn" onclick="detalle=null;render()">← Estadísticas</button><div class="card"><h2 class="card-title">' + escHtml(detalle) + '</h2><p style="color:#999;margin-bottom:15px">' + evs.length + ' evento' + (evs.length !== 1 ? 's' : '') + (totalPrecio > 0 ? ' · ' + totalPrecio.toFixed(2) + ' €' : '') + '</p>';
      evs.forEach(function(e, idx) { html += renderEvento(e, idx); });
      html += '</div></div>';
      app.innerHTML = html;
      return;
    }

    var arts = {};
    eventos.forEach(function(e) { (e.grupos||'').split(',').map(function(g){return g.trim();}).filter(function(g){return g;}).forEach(function(a) { arts[a] = (arts[a]||0)+1; }); });
    var artListBase = Object.keys(arts).map(function(k){return [k,arts[k]];});
    var cities = {};
    var sinCiudad = 0;
    eventos.forEach(function(e) { if(e.ciudad) cities[e.ciudad] = (cities[e.ciudad]||0)+1; else sinCiudad++; });
    var cityListBase = Object.keys(cities).map(function(k){return [k,cities[k]];});
    if (sinCiudad > 0) cityListBase.push(['⚠️ Sin ciudad', sinCiudad]);
    var places = {};
    var sinLugar = 0;
    eventos.forEach(function(e) { if(e.lugar) places[e.lugar] = (places[e.lugar]||0)+1; else sinLugar++; });
    var placeListBase = Object.keys(places).map(function(k){return [k,places[k]];});
    if (sinLugar > 0) placeListBase.push(['⚠️ Sin venue', sinLugar]);
    var years = {};
    var sinAno = 0;
    eventos.forEach(function(e) { var y = getAno(e); if(y) years[y] = (years[y]||0)+1; else sinAno++; });
    var yearListBase = Object.keys(years).map(function(k){return [k,years[k]];});
    if (sinAno > 0) yearListBase.push(['⚠️ Sin año', sinAno]);

    function sortList(list, key) {
      var l = list.slice();
      if (sortOrden[key] === 'az') return l.sort(function(a,b){return a[0].localeCompare(b[0]);});
      return l.sort(function(a,b){return b[1]-a[1];});
    }
    function sortBtn(key) {
      var isAz = sortOrden[key] === 'az';
      return '<button onclick="sortOrden[\'' + key + '\']=\'' + (isAz?'num':'az') + '\';render()" style="background:#000;border:2px solid #f00;color:#f00;border-radius:8px;padding:10px 18px;font-size:18px;font-weight:900;cursor:pointer;float:right">' + (isAz ? '1→9' : 'A-Z') + '</button>';
    }

    var artList = sortList(artListBase, 'artistas');
    var cityList = sortList(cityListBase, 'ciudades');
    var placeList = sortList(placeListBase, 'lugares');
    var yearList = sortList(yearListBase, 'anos');

    var conc = eventos.filter(function(e){return e.tipo==='concierto';}).length;
    var fest = eventos.filter(function(e){return e.tipo==='festival';}).length;
    var totalGasto = 0;
    eventos.forEach(function(e) { if (e.precio) totalGasto += parseFloat(e.precio) || 0; });
    var totalArts = artListBase.length;

    window._listas = { artistas: artList, ciudades: cityList, lugares: placeList, anos: yearList };

    var html = '<div class="container"><button class="back-btn" onclick="goTo(\'home\')">← Volver</button><div class="card"><h2 class="card-title">Estadísticas</h2>';
    html += '<div class="stat-grid">';
    html += '<div class="stat-card stat-concierto" onclick="detalle=\'concierto\';tipoD=\'tipo\';render()"><div class="stat-number">' + conc + '</div><div class="stat-label">Conciertos</div></div>';
    html += '<div class="stat-card stat-festival" onclick="detalle=\'festival\';tipoD=\'tipo\';render()"><div class="stat-number">' + fest + '</div><div class="stat-label">Festivales</div></div>';
    html += '<div class="stat-card" style="background:linear-gradient(145deg,#880088,#440044);border-color:#ff00ff"><div class="stat-number" style="color:#fff">' + totalArts + '</div><div class="stat-label" style="color:#fff">🎸 Artistas</div></div>';
    if (totalGasto > 0) html += '<div class="stat-card stat-dinero" style="grid-column:unset"><div class="stat-number">' + totalGasto.toFixed(2) + ' €</div><div class="stat-label">💶 Gastado</div></div>';
    html += '</div>';

    function renderListSection(title, list, listaKey, tipoKey) {
      if (list.length === 0) return '';
      var preview = list.slice(0, 10);
      var s = '<div class="list-section"><h3 class="list-title" style="overflow:hidden">' + title + ' ' + sortBtn(listaKey) + '</h3><div class="list-container">';
      preview.forEach(function(item, i) {
        var badge = tipoKey === 'ano' ? item[1] : item[1] + 'x';
        s += '<div class="list-item" onclick="selLista(\'' + listaKey + '\',' + i + ',\'' + tipoKey + '\')"><span class="list-name">' + escHtml(item[0]) + '</span><span class="list-badge">' + badge + '</span></div>';
      });
      s += '</div>';
      if (list.length > 10) {
        s += '<button onclick="verListaCompleta(\'' + listaKey + '\',\'' + tipoKey + '\')" style="width:100%;margin-top:8px;padding:12px;background:#000;border:2px solid #f00;border-radius:8px;color:#f00;font-size:18px;font-weight:900;cursor:pointer">Ver todos (' + list.length + ')</button>';
      }
      s += '</div>';
      return s;
    }
    html += renderListSection('🎸 Artistas', artList, 'artistas', 'artista');
    html += renderListSection('📍 Ciudades', cityList, 'ciudades', 'ciudad');
    html += renderListSection('🏟️ Venues', placeList, 'lugares', 'lugar');
    html += renderListSection('📅 Años', yearList, 'anos', 'ano');
    html += '</div></div>';
    app.innerHTML = html;
  }

  else if (page === 'buscar') {
    var s = search.toLowerCase();
    var sa = searchArtista.toLowerCase();

    var artsB = {};
    eventos.forEach(function(e) { (e.grupos||'').split(',').map(function(g){return g.trim();}).filter(function(g){return g;}).forEach(function(a) { artsB[a] = (artsB[a]||0)+1; }); });
    var artBuscarList = Object.keys(artsB).map(function(k){return [k,artsB[k]];}).sort(function(a,b){return a[0].localeCompare(b[0]);});
    if (sa) artBuscarList = artBuscarList.filter(function(item){ return item[0].toLowerCase().indexOf(sa) >= 0; });

    var filt = eventos.filter(function(e) {
      if (filtroTipo !== 'todos' && e.tipo !== filtroTipo) return false;
      if (!s) return true;
      return e.nombre.toLowerCase().indexOf(s) >= 0 ||
             (e.grupos||'').toLowerCase().indexOf(s) >= 0 ||
             (e.ciudad||'').toLowerCase().indexOf(s) >= 0 ||
             (e.lugar||'').toLowerCase().indexOf(s) >= 0 ||
             String(getAno(e)).indexOf(s) >= 0;
    });
    var btnTodos = filtroTipo === 'todos' ? 'active' : '';
    var btnConc = filtroTipo === 'concierto' ? 'active' : '';
    var btnFest = filtroTipo === 'festival' ? 'active' : '';

    if (!window._buscarTab) window._buscarTab = 'eventos';
    var tabEv = window._buscarTab === 'eventos';

    var html = '<div class="container"><button class="back-btn" onclick="goTo(\'home\')">← Volver</button><div class="card"><h2 class="card-title">Buscar</h2>';
    html += '<div style="display:flex;gap:8px;margin-bottom:12px">';
    html += '<button onclick="window._buscarTab=\'eventos\';render()" style="flex:1;padding:12px;background:' + (tabEv?'#f00':'#000') + ';border:2px solid #f00;border-radius:8px;color:' + (tabEv?'#000':'#f00') + ';font-weight:900;font-size:18px;cursor:pointer">🔍 Eventos</button>';
    html += '<button onclick="window._buscarTab=\'artistas\';render()" style="flex:1;padding:12px;background:' + (!tabEv?'#f00':'#000') + ';border:2px solid #f00;border-radius:8px;color:' + (!tabEv?'#000':'#f00') + ';font-weight:900;font-size:18px;cursor:pointer">🎸 Artistas</button>';
    html += '</div>';

    if (tabEv) {
      html += '<input id="searchInput" class="search-input" placeholder="Buscar eventos..." value="' + escHtml(search) + '" oninput="updateSearch(this.value)" style="text-transform:none">';
      html += '<div class="filter-bar"><button class="filter-btn ' + btnTodos + '" onclick="filtroTipo=\'todos\';render()">Todos</button><button class="filter-btn ' + btnConc + '" onclick="filtroTipo=\'concierto\';render()">Conciertos</button><button class="filter-btn ' + btnFest + '" onclick="filtroTipo=\'festival\';render()">Festivales</button></div>';
      if (filt.length === 0) {
        html += '<p style="text-align:center;color:#666;padding:30px">' + (search || filtroTipo !== 'todos' ? 'Sin resultados' : 'Escribe para buscar') + '</p>';
      } else {
        window._curEvs = filt;
        filt.forEach(function(e, idx) { html += renderEvento(e, idx); });
      }
    } else {
      html += '<input id="searchArtInput" class="search-input" placeholder="Buscar artista..." value="' + escHtml(searchArtista) + '" oninput="searchArtista=this.value;render()" style="text-transform:none">';
      if (artBuscarList.length === 0) {
        html += '<p style="text-align:center;color:#666;padding:30px">' + (sa ? 'Sin resultados' : 'Escribe para buscar') + '</p>';
      } else {
        artBuscarList.forEach(function(item) {
          html += '<div class="list-item" onclick="detalle=\''+escHtml(item[0])+'\';tipoD=\'artista\';page=\'estadisticas\';render()"><span class="list-name">' + escHtml(item[0]) + '</span><span class="list-badge">' + item[1] + 'x</span></div>';
        });
      }
    }
    html += '</div></div>';
    app.innerHTML = html;
    var inp = document.getElementById('searchInput');
    if (inp) { inp.focus(); inp.setSelectionRange(search.length, search.length); }
    var inpa = document.getElementById('searchArtInput');
    if (inpa) { inpa.focus(); inpa.setSelectionRange(searchArtista.length, searchArtista.length); }
  }

  else if (page === 'datos') {
    var html = '<div class="container"><button class="back-btn" onclick="goTo(\'home\')">← Volver</button><div class="card"><h2 class="card-title">💾 Datos</h2>';
    html += '<p style="color:#999;margin-bottom:20px;font-size:20px">Exporta tus datos para hacer una copia de seguridad o impórtalos desde otra copia.</p>';
    html += '<button class="submit-btn" onclick="exportar()">📤 Exportar datos</button>';
    html += '<button class="import-btn" onclick="document.getElementById(\'fileInput\').click()">📥 Importar datos</button>';
    html += '<input type="file" id="fileInput" accept=".json" style="display:none" onchange="importar(this)">';
    html += '<p style="color:#666;font-size:20px;margin-top:20px;text-align:center">' + eventos.length + ' eventos guardados</p>';
    html += '</div></div>';
    app.innerHTML = html;
  }
}

var _listaCompleta = null;
var _listaCompletaTipo = null;

function verListaCompleta(listaKey, tipoKey) {
  if (!listaKey) { _listaCompleta = null; render(); return; }
  _listaCompleta = listaKey;
  _listaCompletaTipo = tipoKey;
  var app = document.getElementById('app');
  var list = window._listas[listaKey] || [];
  var titles = { artistas: '🎸 Artistas', ciudades: '📍 Ciudades', lugares: '🏟️ Venues', anos: '📅 Años' };
  var html = '<div class="container"><button class="back-btn" onclick="verListaCompleta(null,null)">← Estadísticas</button><div class="card"><h2 class="card-title">' + (titles[listaKey]||listaKey) + '</h2>';
  list.forEach(function(item, i) {
    var badge = tipoKey === 'ano' ? item[1] : item[1] + 'x';
    html += '<div class="list-item" onclick="selLista(\'' + listaKey + '\',' + i + ',\'' + tipoKey + '\')"><span class="list-name">' + escHtml(item[0]) + '</span><span class="list-badge">' + badge + '</span></div>';
  });
  html += '</div></div>';
  app.innerHTML = html;
}

function selLista(lista, idx, tipo) {
  detalle = window._listas[lista][idx][0];
  tipoD = tipo;
  render();
}

function accion(idx, tipo) {
  var arr = window._curEvs || [];
  var ev = arr[idx];
  if (!ev) return;
  if (tipo === 0) editar(ev.id);
  else eliminar(ev.id);
}

function exportar() {
  var data = JSON.stringify(eventos, null, 2);
  var blob = new Blob([data], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'mis-conciertos-backup.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importar(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) { alert('Archivo no válido'); return; }
      if (confirm('Esto reemplazará tus ' + eventos.length + ' eventos actuales con ' + data.length + ' eventos del archivo. ¿Continuar?')) {
        eventos = data;
        localStorage.setItem('eventos', JSON.stringify(eventos));
        alert('Importados ' + data.length + ' eventos. 🤘');
        goTo('home');
      }
    } catch(err) { alert('Error al leer el archivo'); }
  };
  reader.readAsText(file);
}

function goTo(p) {
  editando = null;
  form = { tipo: 'concierto', nombre: '', grupos: '', ano: '', lugar: '', ciudad: '', precio: '' };
  page = p;
  history.pushState({page: p}, '', '');
  render();
}

window.addEventListener('popstate', function() {
  if (detalle) { detalle = null; render(); return; }
  if (page !== 'home') { page = 'home'; render(); }
});

function setTipo(t) { form.tipo = t; render(); }

function updateSearch(val) { search = val; render(); }

var paginaAntes = 'home';
function editar(id) {
  var evento = null;
  for (var i = 0; i < eventos.length; i++) { if (eventos[i].id === id) { evento = eventos[i]; break; } }
  if (evento) {
    paginaAntes = page;
    editando = id;
    form = { tipo: evento.tipo, nombre: evento.nombre, grupos: evento.grupos||'', ano: getAno(evento), lugar: evento.lugar||'', ciudad: evento.ciudad||'', precio: evento.precio||'' };
    page = 'agregar';
    render();
  }
}

function guardar() {
  var nombre = document.getElementById('inNombre').value.toUpperCase();
  var grupos = document.getElementById('inGrupos').value.toUpperCase();
  var ano = document.getElementById('inAno').value;
  var lugar = document.getElementById('inLugar').value.toUpperCase();
  var ciudad = document.getElementById('inCiudad').value.toUpperCase();
  var precio = document.getElementById('inPrecio').value;
  if (!nombre) { alert('Completa el nombre'); return; }
  var eventoData = { tipo: form.tipo, nombre: nombre, grupos: grupos, ano: ano, lugar: lugar, ciudad: ciudad, precio: precio };
  if (editando) {
    for (var i = 0; i < eventos.length; i++) { if (eventos[i].id === editando) { eventos[i] = Object.assign({id: editando}, eventoData); break; } }
    editando = null;
    alert('Actualizado! 🤘');
  } else {
    eventoData.id = Date.now();
    eventos.push(eventoData);
    alert('Guardado! 🤘');
  }
  localStorage.setItem('eventos', JSON.stringify(eventos));
  if (editando === null && paginaAntes && paginaAntes !== 'agregar') {
    page = paginaAntes;
    paginaAntes = 'home';
    render();
    return;
  }
  form = { tipo: form.tipo, nombre: '', grupos: '', ano: '', lugar: '', ciudad: '', precio: '' };
  page = 'agregar';
  render();
}

function eliminar(id) {
  if (confirm('Eliminar este evento?')) {
    eventos = eventos.filter(function(e) { return e.id !== id; });
    localStorage.setItem('eventos', JSON.stringify(eventos));
    render();
  }
}

history.replaceState({page: 'home'}, '', '');
render();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(reg) { reg.unregister(); });
  });
}
</script>
